---
format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  primary:
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - git-clone@8: {}
      - restore-npm-cache@2: {}
      - restore-cocoapods-cache@2: {}
      - nvm@1:
          inputs:
            - node_version_number: '24'
      - script@1:
          title: Install pnpm and dependencies
          inputs:
            - working_dir: example
            - content: |-
                #!/usr/bin/env bash
                set -e
                set -x
                npm install -g pnpm
                pnpm install
      - script@1:
          title: Expo Prebuild iOS
          inputs:
            - working_dir: example
            - content: |-
                #!/usr/bin/env bash
                set -e
                set -x
                pnpm expo prebuild --platform ios --clean
      - npm@3:
          inputs:
            - command: install -g detox-cli
            - workdir: example
      - cocoapods-install@3:
          inputs:
            - source_root_path: '$BITRISE_SOURCE_DIR/example/ios'
      - restore-cache@1:
          title: Restore Detox Build Cache
          inputs:
            - key: |-
                detox-build-{{ checksum "example/ios/Podfile.lock" }}-{{ checksum "example/app.json" }}
                detox-build-
      - script@1:
          inputs:
            - working_dir: example
            - content: "#!/usr/bin/env bash\n# fail if any commands fails\nset -e\n# debug
                log\nset -x\n   \n# applesimutils is a collection of utils for Apple simulators\nbrew
                tap wix/brew\nbrew install applesimutils"
          title: Detox Install
      - script@1:
          title: Detox Build Framework Cache
          inputs:
            - working_dir: example
            - content: |-
                #!/usr/bin/env bash
                set -e
                set -x
                detox clean-framework-cache
                detox build-framework-cache
      - script@1:
          inputs:
            - working_dir: example
            - content: "#!/usr/bin/env bash\n# fail if any commands fails\nset -e\n# debug
                log\nset -x\n      \n# we are building a release device configuration\npnpm
                detox build --configuration ios.sim.release"
          title: Detox Build
      - save-cache@1:
          title: Save Detox Build Cache
          inputs:
            - key: detox-build-{{ checksum "example/ios/Podfile.lock" }}-{{ checksum "example/app.json" }}
            - paths: example/ios/build
            - is_key_unique: "true"
      - script@1:
          inputs:
            - working_dir: example
            - content: "#!/usr/bin/env bash\n# fail if any commands fails\nset -e\n# debug
                log\nset -x\n   \n# we are testing a release device configuration\npnpm
                detox test --configuration ios.sim.release --cleanup"
          title: Detox Test
      - save-npm-cache@1: {}
      - save-cocoapods-cache@1: {}
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: example
app:
  envs:
    - opts:
        is_expand: false
      BITRISE_PROJECT_PATH: example/ios/SwiperFlatListExample.xcworkspace
    - opts:
        is_expand: false
      BITRISE_SCHEME: SwiperFlatListExample
    - opts:
        is_expand: false
      BITRISE_EXPORT_METHOD: development
trigger_map:
  - push_branch: master
    workflow: primary
  - pull_request_source_branch: '*'
    workflow: primary
    pull_request_target_branch: master
meta:
  bitrise.io:
    stack: osx-xcode-26.0.x
